<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ثانويتنا</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* 🔷 الهيدر */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
}

header img {
    width: 340px; /* حجم الشعار الجديد */
}

header #schoolName {
    font-size: 45px;
    font-weight: bold;
    margin-top: 10px;
}

/* 🔷 عنوان الصفحة */
.page-title {
    font-size: 120px;
    font-weight: bold;
    margin: 40px 0 30px 0;
    color: #bb9d84;
}

/* 🔷 الفيديو */
.video-container {
    display: flex;
    justify-content: center;
    margin-bottom: 50px;
}

video {
    width: 80%; /* حجم كبير في منتصف الصفحة */
    max-width: 1200px;
    border-radius: 12px;
}
</style>

</head>

<body>

<!-- 🔷 الهيدر -->
<header>
    <img src="Nobles.png" alt="شعار المدرسة">
    <div id="schoolName">ثانوية النبلاء النموذجية للبنين</div>
</header>

<!-- 🔷 عنوان الصفحة -->
<div class="page-title">ثانويتنا</div>

<!-- 🔷 الفيديو الكبير -->
<div class="video-container">
    <video controls>
        <source src="Noblesvid.mp4" type="video/mp4">
        المتصفح الخاص بك لا يدعم الفيديو.
    </video>
</div>

</body>
<!-- 🔷 الفوتر -->
<footer style="background:#bb9d84; color:white; padding:20px; text-align:center; font-family:Arial, sans-serif;">
    <!-- شعار صغير -->
    <img src="Nobles.png" alt="شعار المدرسة" style="width:60px; display:block; margin:0 auto 10px auto;">

    <!-- الحقوق -->
    <p style="margin:5px; font-size:16px;">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>

    <!-- العبارة الجميلة -->
    <p style="margin:5px; font-size:18px; font-weight:bold;">بالعلم ونبل الأخلاق نرتقي سلم المجد</p>
</footer>
</html>
