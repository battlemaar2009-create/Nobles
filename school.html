<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ثانويتنا</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* 🔷 الهيدر */
.header {
    text-align: center;
    padding: 20px;
    background: #fff;
}

.logo {
    width: 340px;
}

/* 🔷 الصورة */
.main-image {
    display: block;
    margin: 30px auto;
    width: 80%;
    border-radius: 12px;
}

/* 🔷 مربع النص */
.text-box {
    width: 80%;
    margin: auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* 🔷 العنوان */
.text-title {
    text-align: right;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
}

/* 🔷 النص */
.text-content {
    text-align: right;
    font-size: 18px;
    line-height: 1.8;
}

/* 🔷 الفوتر */
.footer {
    margin-top: 40px;
    text-align: center;
    padding: 20px;
    background: #222;
    color: #fff;
}
</style>

</head>

<body>

<!-- 🔷 الهيدر -->
<div class="header">
    <img src="nobles.png" class="logo">
</div>

<!-- 🔷 الصورة (ضع صورتك هنا) -->
<img src="school.jpg" class="main-image">

<!-- 🔷 مربع النص -->
<div class="text-box">

    <div class="text-title">
        ثانويتنا
    </div>

    <div class="text-content">
        تأسست ثانوية النبلاء النموذجية للبنين في عام 2021 ميلادي وضمت المدرسة مدرسين من اصحاب الشهادات العليا وطلاب ذوي كفاءة عالية
    </div>

</div>

<!-- 🔷 الفوتر -->
<div class="footer">
    جميع الحقوق محفوظة لإعلام ثانوية النبلاء النموذجية للبنين
    <br>
    بالعلم ونبل الاخلاق نرتقي سلم المجد
</div>

</body>
</html>
