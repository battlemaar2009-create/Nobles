<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل الأزياء | ثانوية النبلاء</title>

<style>
/* ⚙️ المتغيرات الموحدة */
:root {
    --primary-color: #bb9d84;
    --bg-light: #f4f6f8;
    --card-bg: #ffffff;
    --text-color: #333333;
    --gold-line: #d4af37;
    
    --hf-bg: linear-gradient(135deg, #bb9d84 0%, #a68b73 100%);
    --hf-text: #ffffff;

    /* إعدادات الصور */
    --wrapper-width: 420px;  
    --wrapper-height: 700px;
}

/* 🌙 الوضع الليلي الملكي */
body.dark-mode {
    --bg-light: #0a0a0a;
    --card-bg: #161616;
    --text-color: #e0e0e0;
    --hf-bg: radial-gradient(circle at center, #1c1c1c 0%, #000000 100%);
    --hf-text: #bb9d84; 
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-light);
    color: var(--text-color);
    text-align: center;
    transition: all 0.4s ease;
}

/* 🔷 الهيدر الموحد */
header {
    background: var(--hf-bg);
    color: var(--hf-text);
    padding: 20px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 3px solid var(--gold-line);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.header-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

header img.logo { 
    width: 100px; 
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
}

header h1 { font-size: clamp(18px, 5vw, 28px); margin: 0; font-weight: 800; }

/* 🔹 عنوان الصفحة */
.guide-title {
    font-size: clamp(30px, 8vw, 50px);
    font-weight: 900;
    margin: 50px 0 10px 0;
    color: var(--primary-color);
}
body.dark-mode .guide-title { color: #ffffff; }

/* 👔 حاوية عرض الأزياء */
.fashion-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 50px;
    padding: 20px;
    margin-bottom: 60px;
}

.fashion-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: 0.4s ease;
}

.img-wrapper {
    width: var(--wrapper-width);
    height: var(--wrapper-height);
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    border: 3px solid var(--gold-line);
    background-color: var(--card-bg);
    position: relative;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.img-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: 0.5s;
}

.fashion-card:hover .img-wrapper {
    transform: translateY(-15px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.fashion-card:hover img {
    transform: scale(1.05);
}

.uniform-label {
    margin-top: 25px;
    font-size: 26px;
    font-weight: 900;
    color: var(--hf-text);
    background: var(--hf-bg);
    padding: 10px 40px;
    border-radius: 50px;
    border: 2px solid var(--gold-line);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* 🔷 الفوتر الموحد */
footer {
    background: var(--hf-bg);
    color: var(--hf-text);
    padding: 50px 20px;
    border-top: 4px solid var(--gold-line);
}
footer .footer-logo { width: 80px; margin-bottom: 15px; filter: brightness(1.1); }
footer .rights-text { font-size: 16px; opacity: 0.8; margin: 10px 0; }
footer .motto-text { font-size: 22px; font-weight: bold; margin-top: 10px; }

/* 📱 استجابة الموبايل */
@media (max-width: 600px) {
    .img-wrapper { width: 85vw; height: 450px; }
    .header-container { flex-direction: column; gap: 8px; }
    .guide-title { font-size: 35px; }
}
</style>
</head>

<body id="body">

<header>
    <div class="header-container">
        <img src="Nobles.png" class="logo">
        <h1>ثانوية النبلاء النموذجية للبنين</h1>
    </div>
</header>

<div class="guide-title">دليل الأزياء</div>

<div class="fashion-container">
    <div class="fashion-card">
        <div class="img-wrapper">
            <img src="Fashion2.png" alt="زي المتوسطة">
        </div>
        <div class="uniform-label">زي المتوسطة</div>
    </div>

    <div class="fashion-card">
        <div class="img-wrapper">
            <img src="Fashion.png" alt="زي الإعدادية">
        </div>
        <div class="uniform-label">زي الإعدادية</div>
    </div>
</div>

<footer>
    <img src="Nobles.png" class="footer-logo">
    <p class="rights-text">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p class="motto-text">بالعلم ونبل الأخلاق نرتقي <b>سلم المجد</b></p>
</footer>

<script>
// 👈 مزامنة الوضع الليلي تلقائياً مع الصفحة الرئيسية
window.onload = function() {
    if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('body').classList.add('dark-mode');
    }
};
</script>

</body>
</html>
