<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ثانوية النبلاء</title>

<style>
/* 👈 الأساسيات */
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    font-size: 25px;
    text-align: center;
    background-color: #f4f4f4;
}

/* 🔷 الهيدر */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img.logo {
    width: 350px;
    height: auto;
}

header h1 {
    font-size: 35px;
    margin: 10px 0 0 0;
}

/* 🔹 زر الأوبشنز الثلاثية */
.menu-btn {
    font-size: 40px;
    cursor: pointer;
    position: absolute;
    top: 20px;
    left: 20px;
    user-select: none;
}

/* 🔹 القائمة المنسدلة */
.fullscreen-menu {
    display: none; 
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(187,157,132,0.6); 
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

/* 🔹 المستطيل حول الخيارات */
.menu-box {
    background-color: #ffffff; 
    border-radius: 15px;
    padding: 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 250px;
}

/* 🔹 الروابط داخل القائمة */
.fullscreen-menu a {
    font-size: 25px;
    color: #000000;
    text-decoration: none;
    margin: 10px 0;
    width: 100%;
    text-align: center;
}

.fullscreen-menu a:hover {
    color: #bb9d84;
}

/* 🔹 زر الإغلاق */
.close-btn {
    font-size: 50px;
    font-weight: bold;
    color: black;
    cursor: pointer;
    position: absolute;
    top: 20px;
    left: 20px;
}

/* 🔹 السوشيال ميديا */
.social img {
    width: 100px;
    margin: 5px;
    transition: 0.3s;
}

.social img:hover {
    transform: scale(1.2);
}

/* 🔹 الكروت (تم الحفاظ على التنسيق الأصلي 100%) */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin: 40px;
}

.card {
    width: 240px;
    height: 340px;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    transition: 0.3s;
    background-color: #f9f9f9;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card h3 {
    position: absolute;
    bottom: 0;
    width: 100%;
    margin: 0;
    padding: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    font-size: 22px;
}

/* 🔷 الفوتر المطور (التحديث المطلوب) */
footer {
    background: #bb9d84;
    color: white;
    padding: 40px 20px;
    margin-top: 60px;
    border-top: 5px solid #a68b73;
    text-align: center;
}

footer .footer-logo {
    width: 80px;
    margin-bottom: 15px;
}

footer .rights-text {
    font-size: 18px;
    margin: 10px 0;
    opacity: 0.9;
}

footer .motto-text {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <img src="Nobles.png" class="logo" alt="شعار المدرسة">
    <h1>ثانوية النبلاء النموذجية للبنين</h1>
</header>

<div class="fullscreen-menu" id="fullscreenMenu">
    <div class="close-btn" onclick="toggleMenu()">×</div>
    <div class="menu-box">
        <a href="newspaper.html">جريدة النبلاء</a>
        <a href="students.html">طلابنا</a>
        <a href="school.html">ثانويتنا</a>
        <a href="tamima.html">التميمة</a>
        <a href="activities.html">فعاليات النبلاء</a>
        <a href="fashion.html">دليل الازياء</a>
    </div>
</div>

<div style="width:100%; overflow:hidden;">
    <img src="main.jpg" style="width:100%; height:280px; object-fit:cover;">
</div>

<div class="social" style="margin:20px 0;">
    <a href="https://www.instagram.com/n.ub.a?igsh=MWFmeDIzNWQyNzd1aA==" target="_blank"><img src="images (1) (4).jpeg"></a>
    <a href="https://www.facebook.com/profile.php?id=100076005472140" target="_blank"><img src="images (5).png"></a>
    <a href="https://www.tiktok.com/@n.ub.a?_r=1&_t=ZS-95colKH4wGS" target="_blank"><img src="images (4).png"></a>
    <a href="https://www.youtube.com/@n.ub.a" target="_blank"><img src="Youtube.jpg"></a>
</div>

<div class="container">

    <a href="newspaper.html" style="text-decoration:none;">
        <div class="card">
            <img src="SAVE_20260417_170539.jpg">
            <h3>📘 جريدة النبلاء</h3>
        </div>
    </a>

    <a href="students.html" style="text-decoration:none;">
        <div class="card">
            <img src="ammar.jpg">
            <h3>👨‍🎓 طلابنا</h3>
        </div>
    </a>

    <a href="school.html" style="text-decoration:none;">
        <div class="card">
            <img src="Screenshot_2026-04-17-21-58-03-516_com.miui.mediaviewer.jpg">
            <h3>🏫 ثانويتنا</h3>

    <a href="tamima.html" style="text-decoration:none;">
        <div class="card">
            <img src="Terrr.png">

        </div>
    </a>

    <a href="activities.html" style="text-decoration:none;">
        <div class="card">
            <img src="Nobles.png">
            <h3>🎉 فعاليات النبلاء</h3>
        </div>
    </a>

    <a href="fashion.html" style="text-decoration:none;">
        <div class="card">
            <img src="Fashion.png">

        </div>
    </a>

</div>

<footer>
    <img src="Nobles.png" class="footer-logo" alt="شعار المدرسة">
    <p class="rights-text">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p class="motto-text">بالعلم ونبل الأخلاق نرتقي سلم المجد</p>
</footer>

<script>
function toggleMenu() {
    const menu = document.getElementById("fullscreenMenu");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

window.onclick = function(event) {
    const menu = document.getElementById("fullscreenMenu");
    if (event.target === menu) {
        menu.style.display = "none";
    }
}
</script>

</body>
</html>
