<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ثانوية النبلاء</title>

<style>
body {
    margin: 0;
    font-family: Times New Roman;
    text-align: center;
    font-size:25px;
}

/* الهيدر */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
}

header img {
    width: 150px;
}

/* السوشيال */
.social img {
    width: 40px;
    margin: 5px;
    transition: 0.3s;
}

.social img:hover {
    transform: scale(1.2);
}

/* الكروت */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin: 40px;
}

.card {
    width: 240px;
    height: 340px;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card h3 {
    position: absolute;
    bottom: 0;
    width: 100%;
    margin: 0;
    padding: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
}
</style>

</head>
