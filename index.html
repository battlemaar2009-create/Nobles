<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ثانوية النبلاء</title>

<style>
/* 👈 الأساسيات */
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    font-size: 25px;
    text-align: center;
}

/* 🔷 الهيدر */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img {
    width: 350px;
    height: auto;
}

header h1 {
    font-size: 35px;
    margin: 10px 0 0 0;
}

/* 🔹 زر الأوبشنز الثلاثية */
.menu-btn {
    font-size: 40px;
    cursor: pointer;
    position: absolute;
    top: 20px;
    left: 20px;
    user-select: none;
}

/* 🔹 القائمة المنسدلة */
.fullscreen-menu {
    display: none; /* تم التأكد من بقائها مخفية عند التحميل */
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(187,157,132,0.6); 
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

/* 🔹 المستطيل حول الخيارات */
.menu-box {
    background-color: #ffffff; 
    border-radius: 15px;
    padding: 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 250px;
}

/* 🔹 الروابط داخل القائمة */
.fullscreen-menu a {
    font-size: 25px;
    color: #000000;
    text-decoration: none;
    margin: 10px 0;
    width: 100%;
    text-align: center;
}

.fullscreen-menu a:hover {
    color: #bb9d84;
}

/* 🔹 زر الإغلاق */
.close-btn {
    font-size: 50px;
    font-weight: bold;
    color: black;
    cursor: pointer;
    position: absolute;
    top: 20px;
    left: 20px;
}

/* 🔹 السوشيال ميديا */
.social img {
    width: 100px;
    margin: 5px;
    transition: 0.3s;
}

.social img:hover {
    transform: scale(1.2);
}

/* 🔹 الكروت */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin: 40px;
}

.card {
    width: 240px;
    height: 340px;
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    transition: 0.3s;
    background-color: #f9f9f9;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.card h3 {
    position: absolute;
    bottom: 0;
    width: 100%;
    margin: 0;
    padding: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    font-size: 22px;
}

/* 🔷 الفوتر */
footer {
    background:#bb9d84;
    color:white;
    padding:20px;
    text-align:center;
    font-family:Arial, sans-serif;
}

footer img {
    width:60px;
    display:block;
    margin:0 auto 10px auto;
}

footer p {
    margin: 5px;
}
</style>
</head>

<script>
function toggleMenu() {
    const menu = document.getElementById("fullscreenMenu");
    // التحقق من الحالة الحالية لضمان التبديل الصحيح
    if (menu.style.display === "flex") {
        menu.style.display = "none";
    } else {
        menu.style.display = "flex";
    }
}

// إغلاق عند الضغط خارج القائمة
window.onclick = function(event) {
    const menu = document.getElementById("fullscreenMenu");
    const btn = document.querySelector(".menu-btn");
    if (event.target === menu) {
        menu.style.display = "none";
    }
}
</script>
