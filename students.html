<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طلاب النبلاء - ثانوية النبلاء</title>

<style>
/* 👈 الأساسيات */
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    font-size: 25px;
    text-align: center;
    background-color: #f4f4f4;
}

/* 🔷 الهيدر (مطابق للرئيسية) */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img.logo {
    width: 350px;
    height: auto;
}

header h1 {
    font-size: 35px;
    margin: 10px 0 0 0;
    font-weight: bold;
}

/* 🔹 عنوان الصفحة */
.page-title {
    font-size: 60px;
    font-weight: bold;
    margin: 40px 0 30px 0;
    color: #bb9d84;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}

/* 🖼️ شبكة الصور */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto 50px auto;
    padding: 0 20px;
}

.gallery img {
    width: 280px; 
    height: 380px;
    object-fit: cover;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.gallery img:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

/* 🔍 تكبير الصور */
#overlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 2000;
}
#overlay img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* 🔷 الفوتر المطور (لون ثابت مطابق لطلبك) */
footer {
    background: #bb9d84;
    color: white;
    padding: 40px 20px;
    margin-top: 60px;
    border-top: 5px solid #a68b73;
}

footer .footer-logo {
    width: 80px;
    margin-bottom: 15px;
}

footer .rights-text {
    font-size: 18px;
    margin: 10px 0;
    opacity: 0.9;
}

footer .motto-text {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<header>
    <img src="Nobles.png" class="logo" alt="شعار المدرسة">
    <h1>ثانوية النبلاء النموذجية للبنين</h1>
</header>

<div class="page-title">طلاب النبلاء</div>

<div class="gallery">
    <img src="1.jpg" onclick="zoom(this)">
    <img src="2.jpg" onclick="zoom(this)">
    <img src="3.jpg" onclick="zoom(this)">
    <img src="4.jpg" onclick="zoom(this)">
    <img src="5.jpg" onclick="zoom(this)">
    <img src="6.jpg" onclick="zoom(this)">
    <img src="7.jpg" onclick="zoom(this)">
    <img src="8.jpg" onclick="zoom(this)">
    <img src="9.jpg" onclick="zoom(this)">
</div>

<div id="overlay" onclick="closeZoom()">
    <img id="zoomImg">
</div>

<footer>
    <img src="Nobles.png" class="footer-logo" alt="شعار المدرسة">
    <p class="rights-text">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p class="motto-text">بالعلم ونبل الأخلاق نرتقي سلم المجد</p>
</footer>

<script>
function zoom(img){
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomImg").src = img.src;
}

function closeZoom(){
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
