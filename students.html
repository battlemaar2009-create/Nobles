<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلاب النبلاء | ثانوية النبلاء</title>

<style>
/* ⚙️ المتغيرات الموحدة */
:root {
    --primary-color: #bb9d84;
    --bg-light: #f4f6f8;
    --card-bg: #ffffff;
    --text-color: #333333;
    --gold-line: #d4af37;
    --hf-bg: linear-gradient(135deg, #bb9d84 0%, #a68b73 100%);
    --hf-text: #ffffff;
}

/* 🌙 الوضع الليلي */
body.dark-mode {
    --bg-light: #0a0a0a;
    --card-bg: #161616;
    --text-color: #e0e0e0;
    --hf-bg: radial-gradient(circle at center, #1c1c1c 0%, #000000 100%);
    --hf-text: #bb9d84; 
}

/* ✨ تعريف انميشن الدخول */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-item {
    opacity: 0;
    animation: fadeInUp 0.8s ease forwards;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-light);
    color: var(--text-color);
    text-align: center;
    transition: all 0.4s ease;
    overflow-x: hidden;
}

/* 🔷 الهيدر الموحد */
header {
    background: var(--hf-bg);
    color: var(--hf-text);
    padding: 15px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid var(--gold-line);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.header-container { display: flex; align-items: center; gap: 15px; }
header img.logo { width: 90px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
header h1 { font-size: clamp(16px, 4vw, 26px); margin: 0; font-weight: 800; }

/* 🔹 عنوان الصفحة */
.page-title {
    font-size: clamp(30px, 8vw, 50px);
    font-weight: 900;
    margin: 50px 0 40px 0;
    color: var(--primary-color);
    animation-delay: 0.1s;
}

/* 🖼️ معرض الصور */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    max-width: 1200px;
    margin: 0 auto 60px auto;
    padding: 0 20px;
}

.gallery img {
    width: 280px; 
    height: 380px;
    object-fit: cover;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    border: 2px solid transparent;
}

.gallery img:hover {
    transform: translateY(-12px) scale(1.03);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    border-color: var(--gold-line);
}

/* 🔍 نافذة التكبير */
#overlay {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 3000;
}
#overlay img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(187, 157, 132, 0.3);
}

/* 🔷 الفوتر الموحد */
footer {
    background: var(--hf-bg);
    color: var(--hf-text);
    padding: 50px 20px;
    border-top: 4px solid var(--gold-line);
}
footer .footer-logo { width: 80px; margin-bottom: 15px; filter: brightness(1.1); }
footer .rights-text { font-size: 14px; opacity: 0.8; margin: 10px 0; }
footer .motto-text { font-size: 20px; font-weight: bold; margin-top: 10px; }

/* 📱 الموبايل */
@media (max-width: 600px) {
    .gallery img { width: 45%; height: 220px; border-radius: 15px; } /* صورتين بجانب بعض لتقليل طول الصفحة */
    .page-title { margin: 30px 0 20px 0; }
}
</style>

</head>

<body id="body">

<header>
    <div class="header-container">
        <img src="Nobles.png" class="logo" alt="Logo">
        <h1>ثانوية النبلاء النموذجية للبنين</h1>
    </div>
</header>

<div class="page-title animate-item">طلاب النبلاء</div>

<div class="gallery">
    <img src="1.jpg" class="animate-item" style="animation-delay: 0.2s" onclick="zoom(this)">
    <img src="2.jpg" class="animate-item" style="animation-delay: 0.3s" onclick="zoom(this)">
    <img src="3.jpg" class="animate-item" style="animation-delay: 0.4s" onclick="zoom(this)">
    <img src="4.jpg" class="animate-item" style="animation-delay: 0.5s" onclick="zoom(this)">
    <img src="5.jpg" class="animate-item" style="animation-delay: 0.6s" onclick="zoom(this)">
    <img src="6.jpg" class="animate-item" style="animation-delay: 0.7s" onclick="zoom(this)">
    <img src="7.jpg" class="animate-item" style="animation-delay: 0.8s" onclick="zoom(this)">
    <img src="8.jpg" class="animate-item" style="animation-delay: 0.9s" onclick="zoom(this)">
    <img src="9.jpg" class="animate-item" style="animation-delay: 1.0s" onclick="zoom(this)">
</div>

<div id="overlay" onclick="closeZoom()">
    <img id="zoomImg">
</div>

<footer>
    <img src="Nobles.png" class="footer-logo" alt="Logo">
    <p class="rights-text">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p class="motto-text">بالعلم ونبل الأخلاق نرتقي <b>سلم المجد</b></p>
</footer>

<script>
function zoom(img){
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomImg").src = img.src;
}

function closeZoom(){
    document.getElementById("overlay").style.display = "none";
}

window.onload = function() {
    if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('body').classList.add('dark-mode');
    }
};
</script>

</body>
</html>
