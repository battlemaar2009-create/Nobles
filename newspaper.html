<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جريدة النبلاء | ثانوية النبلاء</title>

<style>
/* ⚙️ المتغيرات الموحدة */
:root {
    --primary-color: #bb9d84;
    --bg-light: #f4f6f8;
    --card-bg: #ffffff;
    --text-color: #333333;
    --gold-line: #d4af37;
    --hf-bg: linear-gradient(135deg, #bb9d84 0%, #a68b73 100%);
    --hf-text: #ffffff;
}

body.dark-mode {
    --bg-light: #0a0a0a;
    --card-bg: #161616;
    --text-color: #e0e0e0;
    --hf-bg: radial-gradient(circle at center, #1c1c1c 0%, #000000 100%);
    --hf-text: #bb9d84; 
}

/* ✨ تعريف الانميشن */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-entry {
    animation: fadeInUp 0.8s ease forwards;
    opacity: 0; /* يبدأ مخفيًا حتى يعمل الانميشن */
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-light);
    color: var(--text-color);
    text-align: center;
    transition: all 0.4s ease;
    overflow-x: hidden;
}

/* 🔷 الهيدر (بدون أزرار كما طلبت) */
header {
    background: var(--hf-bg);
    color: var(--hf-text);
    padding: 15px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 2px solid var(--gold-line);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.header-container { display: flex; align-items: center; gap: 15px; }
header img.logo { width: 90px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2)); }
header h1 { font-size: clamp(16px, 4vw, 26px); margin: 0; font-weight: 800; }

/* 🔷 صناديق عناوين الأعداد */
.issue-box {
    display: inline-block;
    background: var(--hf-bg);
    color: var(--hf-text);
    padding: 12px 45px;
    border-radius: 50px;
    font-size: 24px;
    font-weight: bold;
    margin: 50px auto 30px auto;
    border: 2px solid var(--gold-line);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    animation-delay: 0.2s;
}

/* 🖼️ تنسيق الصور */
.images-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.zoom-img {
    width: 280px;
    height: 380px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s ease;
    object-fit: cover;
    border: 1px solid rgba(0,0,0,0.1);
    background: var(--card-bg);
    animation-delay: 0.4s;
}

.zoom-img:hover { 
    transform: translateY(-10px) scale(1.02); 
    box-shadow: 0 15px 30px rgba(0,0,0,0.2); 
}

.single-img {
    width: 350px;
    max-width: 90%;
    height: auto;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    animation-delay: 0.6s;
}

/* 🔷 الفوتر */
footer {
    background: var(--hf-bg);
    color: var(--hf-text);
    padding: 50px 20px;
    margin-top: 80px;
    border-top: 4px solid var(--gold-line);
}
.footer-logo { width: 80px; margin-bottom: 15px; filter: brightness(1.1); }

/* 🔷 نافذة التكبير */
#overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 3000;
}
#overlay img { 
    max-width: 90%; 
    max-height: 85%; 
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
}

@media (max-width: 600px) {
    .header-container { flex-direction: row; }
    .zoom-img { width: 45%; height: 220px; } /* صورتين بجانب بعض في الموبايل لتقليل المساحة */
    .issue-box { font-size: 18px; padding: 10px 30px; }
}
</style>
</head>

<body id="body">

<header>
    <div class="header-container">
        <img src="Nobles.png" class="logo" alt="Logo">
        <h1>ثانوية النبلاء النموذجية للبنين</h1>
    </div>
</header>

<div class="animate-entry">
    <div class="issue-box">العدد الأول - N (1)</div>
</div>

<div class="images-container">
    <img src="IMG_20260417_192922_914.png" class="zoom-img animate-entry" style="animation-delay: 0.3s" onclick="zoomImage(this)">
    <img src="IMG_20260417_192505_522.png" class="zoom-img animate-entry" style="animation-delay: 0.4s" onclick="zoomImage(this)">
    <img src="IMG_20260417_192808_461.png" class="zoom-img animate-entry" style="animation-delay: 0.5s" onclick="zoomImage(this)">
    <img src="IMG_20260417_193021_908.png" class="zoom-img animate-entry" style="animation-delay: 0.6s" onclick="zoomImage(this)">
    <img src="IMG_20260417_193002_711.png" class="zoom-img animate-entry" style="animation-delay: 0.7s" onclick="zoomImage(this)">
    <img src="IMG_20260417_192944_673.png" class="zoom-img animate-entry" style="animation-delay: 0.8s" onclick="zoomImage(this)">
</div>

<div class="animate-entry" style="animation-delay: 0.9s">
    <div class="issue-box">العدد الثاني - N (2)</div>
</div>

<div style="margin-bottom: 50px;" class="animate-entry" style="animation-delay: 1s">
    <img src="SAVE_20260417_170539.jpg" class="single-img" onclick="zoomImage(this)">
</div>

<div id="overlay" onclick="closeZoom()">
    <img id="zoomedImg">
</div>

<footer>
    <img src="Nobles.png" class="footer-logo">
    <p class="rights-text">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p style="font-size:20px; font-weight:bold; margin-top:10px;">بالعلم ونبل الأخلاق نرتقي <b>سلم المجد</b></p>
</footer>

<script>
function zoomImage(img) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomedImg").src = img.src;
}
function closeZoom() {
    document.getElementById("overlay").style.display = "none";
}

window.onload = function() {
    // مزامنة الوضع الليلي
    if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('body').classList.add('dark-mode');
    }
};
</script>

</body>
</html>
