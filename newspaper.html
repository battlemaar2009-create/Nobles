<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>جريدة النبلاء</title>

<style>
/* 👈 الأساسيات */
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    font-size: 25px;
    text-align: center;
    background-color: #f4f4f4;
}

/* 🔷 الهيدر */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img.logo {
    width: 350px;
    height: auto;
}

header h1 {
    font-size: 35px;
    margin: 10px 0 0 0;
}

/* 🔷 تنسيق عناوين الأعداد الجديد (المطور) */
.issue-box {
    display: block;
    background: linear-gradient(135deg, #bb9d84 0%, #8d735d 100%); /* تدرج لوني فخم */
    color: white;
    padding: 15px 60px;
    border-radius: 50px; /* شكل بيضاوي أنيق */
    font-size: 28px;
    font-weight: bold;
    margin: 70px auto 40px auto;
    width: fit-content;
    text-align: center;
    cursor: default;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2); /* ظل عميق */
    border: 2px solid #ffffff;
    letter-spacing: 1px;
    position: relative;
}

/* إضافة خطوط تزيينية بجانب العنوان */
.issue-box::before, .issue-box::after {
    content: "";
    display: inline-block;
    width: 50px;
    height: 2px;
    background-color: rgba(255,255,255,0.5);
    vertical-align: middle;
    margin: 0 15px;
}

.zoom-img {
    width: 250px;
    margin: 15px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.zoom-img:hover { 
    transform: translateY(-10px) scale(1.05); /* حركة للأعلى عند المرور */
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.single-img {
    width: 350px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
}

.single-img:hover {
    transform: scale(1.02);
}

/* 🔷 نافذة التكبير */
#overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 2000;
}

#overlay img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 10px;
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}

#overlay h2 {
    color: white;
    margin-top: 20px;
    font-size: 28px;
}

/* 🔷 الفوتر */
footer {
    background: #bb9d84;
    color: white;
    padding: 30px;
    text-align: center;
    margin-top: 80px;
}

footer img {
    width: 60px;
    display: block;
    margin: 0 auto 10px auto;
}
</style>

</head>

<body>

<header>
    <img src="Nobles.png" class="logo" alt="شعار المدرسة">
    <h1>ثانوية النبلاء النموذجية للبنين</h1>
</header>

<div class="issue-box">
    العدد الأول - N (1)
</div>

<div style="padding: 0 20px;">
    <img src="IMG_20260417_192922_914.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192505_522.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192808_461.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_193021_908.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_193002_711.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192944_673.png" class="zoom-img" onclick="zoomImage(this)">
</div>

<hr style="width: 80%; margin: 60px auto; border: 0; height: 1px; background: linear-gradient(to right, transparent, #bb9d84, transparent);">

<div class="issue-box">
    العدد الثاني - N (2)
</div>

<div style="margin-bottom: 50px;">
    <img src="SAVE_20260417_170539.jpg" class="single-img" onclick="zoomImage(this)">
</div>

<div id="overlay" onclick="closeZoom()">
    <img id="zoomedImg">
    <h2 id="zoomText"></h2>
</div>

<footer>
    <img src="Nobles.png" alt="شعار المدرسة">
    <p>جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p>بالعلم ونبل الأخلاق نرتقي سلم المجد</p>
</footer>

<script>
function zoomImage(img) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomedImg").src = img.src;
    document.getElementById("zoomText").innerHTML = "";
}

function closeZoom() {
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
