<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>جريدة النبلاء</title>

<style>
/* 👈 الأساسيات */
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    font-size: 25px;
    text-align: center;
    background-color: #f4f4f4;
}

/* 🔷 الهيدر (مطابق للرئيسية بدون زر القائمة) */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img.logo {
    width: 350px;
    height: auto;
}

header h1 {
    font-size: 35px;
    margin: 10px 0 0 0;
}

/* 🔷 تنسيقات الجريدة */
.issue-box {
    display: block;
    background: #bb9d84;
    color: white;
    padding: 14px 30px;
    border-radius: 14px;
    font-size: 22px;
    font-weight: bold;
    margin: 60px auto 25px auto;
    width: fit-content;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.issue-box:hover {
    transform: scale(1.05);
    background: #a8846f;
}

.zoom-img {
    width: 250px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.zoom-img:hover { 
    transform: scale(1.05); 
}

.single-img {
    width: 300px;
    border-radius: 10px;
    margin-top: 20px;
}

/* 🔷 نافذة التكبير */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 2000;
}

#overlay img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}

#overlay h2 {
    color: white;
    margin-top: 20px;
    font-size: 28px;
}

/* 🔷 الفوتر */
footer {
    background: #bb9d84;
    color: white;
    padding: 20px;
    text-align: center;
    margin-top: 60px;
}

footer img {
    width: 60px;
    display: block;
    margin: 0 auto 10px auto;
}
</style>

</head>

<body>

<header>
    <img src="Nobles.png" class="logo" alt="شعار المدرسة">
    <h1>ثانوية النبلاء النموذجية للبنين</h1>
</header>

<div class="issue-box">
    📰 العدد الأول - N (1)
</div>

<div style="margin-top:30px;">
    <img src="IMG_20260417_192922_914.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192505_522.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192808_461.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_193021_908.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_193002_711.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192944_673.png" class="zoom-img" onclick="zoomImage(this)">
</div>

<div class="issue-box" onclick="zoomText(this)" style="margin-top:90px;">
    📰 العدد الثاني - N (2)
</div>

<div>
    <img src="SAVE_20260417_170539.jpg" class="single-img" onclick="zoomImage(this)">
</div>

<div id="overlay" onclick="closeZoom()">
    <img id="zoomedImg">
    <h2 id="zoomText"></h2>
</div>

<footer>
    <img src="Nobles.png" alt="شعار المدرسة">
    <p>جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p>بالعلم ونبل الأخلاق نرتقي سلم المجد</p>
</footer>

<script>
function zoomImage(img) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomedImg").src = img.src;
    document.getElementById("zoomText").innerHTML = "";
}

function zoomText(el) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomedImg").src = "";
    document.getElementById("zoomText").innerHTML = el.innerText;
}

function closeZoom() {
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
