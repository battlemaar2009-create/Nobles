<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>جريدة النبلاء</title>

<style>
/* 👈 الأساسيات */
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    font-size: 25px;
    text-align: center;
    background-color: #f4f4f4;
}

/* 🔷 الهيدر */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img.logo {
    width: 350px;
    height: auto;
}

header h1 {
    font-size: 35px;
    margin: 10px 0 0 0;
    font-weight: bold;
}

/* 🔷 تنسيق عناوين الأعداد (ألوان ثابتة) */
.issue-box {
    display: block;
    background: #bb9d84; /* لون ثابت */
    color: white;
    padding: 15px 60px;
    border-radius: 50px;
    font-size: 28px;
    font-weight: bold;
    margin: 70px auto 40px auto;
    width: fit-content;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    border: 2px solid #ffffff;
}

/* 🖼️ تنسيق الصور */
.zoom-img {
    width: 250px;
    margin: 15px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.4s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.zoom-img:hover { 
    transform: translateY(-10px) scale(1.05); 
}

.single-img {
    width: 350px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    cursor: pointer;
}

/* 🔷 الفوتر المطور (ألوان ثابتة) */
footer {
    background: #bb9d84; /* لون ثابت */
    color: white;
    padding: 40px 20px;
    margin-top: 100px;
    border-top: 5px solid #a68b73;
}

footer .footer-logo {
    width: 80px;
    margin-bottom: 15px;
}

footer .rights-text {
    font-size: 18px;
    margin: 10px 0;
}

footer .motto-text {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

/* 🔷 نافذة التكبير */
#overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}
#overlay img {
    max-width: 90%;
    max-height: 85%;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <img src="Nobles.png" class="logo" alt="شعار المدرسة">
    <h1>ثانوية النبلاء النموذجية للبنين</h1>
</header>

<div class="issue-box">
    العدد الأول - N (1)
</div>

<div style="padding: 0 20px;">
    <img src="IMG_20260417_192922_914.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192505_522.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192808_461.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_193021_908.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_193002_711.png" class="zoom-img" onclick="zoomImage(this)">
    <img src="IMG_20260417_192944_673.png" class="zoom-img" onclick="zoomImage(this)">
</div>

<hr style="width: 70%; margin: 60px auto; border: 0; height: 1px; background: #bb9d84; opacity: 0.3;">

<div class="issue-box">
    العدد الثاني - N (2)
</div>

<div style="margin-bottom: 50px;">
    <img src="SAVE_20260417_170539.jpg" class="single-img" onclick="zoomImage(this)">
</div>

<div id="overlay" onclick="closeZoom()">
    <img id="zoomedImg">
</div>

<footer>
    <img src="Nobles.png" class="footer-logo" alt="شعار المدرسة">
    <p class="rights-text">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p class="motto-text">بالعلم ونبل الأخلاق نرتقي سلم المجد</p>
</footer>

<script>
function zoomImage(img) {
    document.getElementById("overlay").style.display = "flex";
    document.getElementById("zoomedImg").src = img.src;
}
function closeZoom() {
    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
