<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عنوان النبلاء - ثانوية النبلاء</title>

<style>
/* 👈 الأساسيات */
body {
    margin: 0;
    font-family: 'Times New Roman', serif;
    font-size: 25px;
    text-align: center;
    background-color: #f4f4f4;
    line-height: 1.6;
}

/* 🔷 الهيدر (الموحد) */
header {
    background: #bb9d84;
    color: white;
    padding: 20px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}

header img.logo {
    width: 350px;
    height: auto;
}

header h1 {
    font-size: 35px;
    margin: 10px 0 0 0;
    font-weight: bold;
}

/* 📍 قسم العنوان والـ QR */
.address-container {
    max-width: 900px;
    margin: 60px auto;
    padding: 40px 20px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border-top: 10px solid #bb9d84;
}

.location-text {
    font-size: 40px;
    font-weight: bold;
    color: #333;
    margin-bottom: 40px;
    padding: 10px;
    border-bottom: 2px dashed #bb9d84;
    display: inline-block;
}

/* 🔳 إطار الـ QR Code */
.qr-section {
    margin: 20px 0;
}

.qr-box {
    width: 280px;
    height: 280px;
    margin: 0 auto;
    padding: 15px;
    border: 3px solid #bb9d84;
    border-radius: 15px;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.qr-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.qr-label {
    margin-top: 15px;
    font-size: 22px;
    color: #bb9d84;
    font-weight: bold;
}

/* 🔷 الفوتر المطور (الموحد) */
footer {
    background: #bb9d84;
    color: white;
    padding: 40px 20px;
    margin-top: 100px;
    border-top: 5px solid #a68b73;
}

footer .footer-logo {
    width: 80px;
    margin-bottom: 15px;
    display: block;
    margin: 0 auto;
}

footer .rights-text {
    font-size: 18px;
    margin: 10px 0;
    opacity: 0.9;
}

footer .motto-text {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<header>
    <img src="Nobles.png" class="logo" alt="شعار المدرسة">
    <h1>ثانوية النبلاء النموذجية للبنين</h1>
</header>

<div class="address-container">
    <div class="location-text">
        📍 بغداد - مدينة الصدر - شارع الداخل
    </div>

    <div class="qr-section">
        <div class="qr-box">
            <img src="Nonles School.png" alt="QR Code العنوان">
        </div>
        <div class="qr-label">امسح الكود للحصول على الموقع الجغرافي لثانوية النبلاء</div>
    </div>
</div>

<footer>
    <img src="Nobles.png" class="footer-logo" alt="شعار المدرسة">
    <p class="rights-text">جميع الحقوق محفوظة لأعلام ثانوية النبلاء النموذجية للبنين</p>
    <p class="motto-text">بالعلم ونبل الأخلاق نرتقي سلم المجد</p>
</footer>

</body>
</html>
